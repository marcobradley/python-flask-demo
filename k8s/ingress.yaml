apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-demo
  annotations:
    # k3s ships with Traefik as the default ingress controller
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: flask-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flask-demo
                port:
                  number: 80
